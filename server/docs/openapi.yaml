openapi: '3.0.3'
info:
  title: EasyConvert API
  description: LLM-based resume parsing API with multi-tenant support
  version: '1.0.0'
  contact:
    name: EasyConvert Team

servers:
  - url: http://localhost:3001
    description: Development server

paths:
  /api/v1/health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /api/v1/parse:
    post:
      summary: Synchronous single file parse
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF or DOCX resume file (max 10MB)
      responses:
        '200':
          description: Parse result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParseResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/parse/async:
    post:
      summary: Asynchronous parse, returns jobId
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: pending
                  message:
                    type: string

  /api/v1/parse/{jobId}:
    get:
      summary: Query async job status
      security:
        - BearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatus'
        '404':
          description: Job not found

  /api/v1/parse/batch:
    post:
      summary: Batch parse (max 20 files)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  maxItems: 20
      responses:
        '202':
          description: Batch queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobIds:
                    type: array
                    items:
                      type: string
                      format: uuid
                  totalFiles:
                    type: integer
                  message:
                    type: string

  /api/v1/keys:
    post:
      summary: Generate API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, tenantId]
              properties:
                name:
                  type: string
                tenantId:
                  type: string
                  format: uuid
                scopes:
                  type: array
                  items:
                    type: string
                  default: [parse]
                rateLimit:
                  type: integer
                  default: 100
                expiresAt:
                  type: string
                  format: date-time
      responses:
        '201':
          description: API key created (plaintext returned once)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyWithSecret'
    get:
      summary: List API keys (prefix + metadata only)
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKey'

  /api/v1/keys/{id}:
    delete:
      summary: Soft delete API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Key deactivated

  /api/reports:
    post:
      summary: Generate full evaluation report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [taskId]
              properties:
                taskId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Full report data

  /api/reports/trends:
    get:
      summary: Cross-task accuracy trends
      responses:
        '200':
          description: Trend data points

  /api/reports/distribution/{taskId}:
    get:
      summary: Classification distribution for a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Distribution data

  /api/reports/errors/{taskId}:
    get:
      summary: Error pattern analysis
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Error patterns

  /api/reports/cost/{taskId}:
    get:
      summary: Cost tracking for a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cost data

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: 'API Key: Authorization: Bearer ec_...'

  schemas:
    Resume:
      type: object
      required: [basics, work, education]
      properties:
        basics:
          type: object
          properties:
            name:
              type: string
            email:
              type: string
            phone:
              type: string
            title:
              type: string
            location:
              type: string
        work:
          type: array
          items:
            type: object
            properties:
              company:
                type: string
              position:
                type: string
              startDate:
                type: string
              endDate:
                type: string
              responsibilities:
                type: array
                items:
                  type: string
              achievements:
                type: array
                items:
                  type: string
        education:
          type: array
          items:
            type: object
            properties:
              institution:
                type: string
              degree:
                type: string
              major:
                type: string
              startDate:
                type: string
              endDate:
                type: string
        skills:
          type: array
          items:
            type: string
        summary:
          type: string

    ParseResult:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            resume:
              $ref: '#/components/schemas/Resume'
            classification:
              type: object
            difficulty:
              type: string
            fromCache:
              type: boolean
            hash:
              type: string

    JobStatus:
      type: object
      properties:
        jobId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, processing, completed, failed]
        fileName:
          type: string
        result:
          $ref: '#/components/schemas/Resume'
        error:
          type: string
        processingTime:
          type: integer
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    ApiKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        key_prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        rate_limit:
          type: integer
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    ApiKeyWithSecret:
      allOf:
        - $ref: '#/components/schemas/ApiKey'
        - type: object
          properties:
            key:
              type: string
              description: Plaintext key (shown only once)

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              retryAfter:
                type: integer
